<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Asphalt</title>
  <script type="module" src="./main.js"></script>
</head>

<body>
  <nav class="menubar">
    <span class="brand">Asphalt</span>
    <div class="menu-container">
      <button class="menu-trigger" id="fileMenuTrigger">File</button>
      <div class="menu-dropdown" id="fileMenu" hidden>
        <div class="menu-separator"></div>
        <button class="menu-item" id="quitMenuItem">Quit</button>
      </div>
    </div>
    <div class="menu-container">
      <button class="menu-trigger" id="groupMenuTrigger">Group</button>
      <div class="menu-dropdown" id="groupMenu" hidden>
        <button class="menu-item" id="newGroupMenuItem">New Group</button>
        <button class="menu-item" id="inviteMemberMenuItem">Invite Member...</button>
        <div class="menu-separator"></div>
        <button class="menu-item" id="clearActivityMenuItem">Clear Activity</button>
        <button class="menu-item" id="leaveGroupMenuItem">Leave Group</button>
      </div>
    </div>
    <div class="menu-container">
      <button class="menu-trigger" id="identityMenuTrigger">Identity</button>
      <div class="menu-dropdown" id="identityMenu" hidden>
        <button class="menu-item" id="copyTokenMenuItem">Copy Token</button>
        <button class="menu-item" id="rotateRidMenuItem">Rotate RID</button>
        <div class="menu-separator"></div>
        <div class="menu-item menu-label" id="ridMenuLabel">RID: Loading...</div>
      </div>
    </div>
    <div class="menu-container">
      <button class="menu-trigger" id="helpMenuTrigger">Help</button>
      <div class="menu-dropdown" id="helpMenu" hidden>
        <button class="menu-item" id="aboutMenuItem">About</button>
      </div>
    </div>
    <div class="menu-container">
      <button class="menu-trigger" id="viewMenuTrigger">View</button>
      <div class="menu-dropdown" id="viewMenu" hidden>
        <button class="menu-item" id="refreshMenuItem">Refresh</button>
      </div>
    </div>
    <div class="menubar-spacer"></div>
    <span id="connectionSummary" class="menubar-status">Connecting...</span>
    <button id="refreshButton" class="nav-action">Refresh</button>
  </nav>

  <div class="invite-bar" id="inviteBar" hidden>
    <span>Pending invite from <strong id="inviteRid">Unknown</strong></span>
    <div class="invite-actions">
      <button id="acceptInviteButton">Accept</button>
      <button id="rejectInviteButton">Reject</button>
    </div>
  </div>

  <div class="chat-layout">
    <div class="chat-peers">
      <div class="list-header">
        <div class="list-title">Groups</div>
      </div>
      <div id="peerList" class="peer-list"></div>
    </div>
    <div class="chat-main">
      <div class="chat-header">
        <span id="activeGroupTitle">No group selected</span>
      </div>
      <div id="activityList" class="activity-list empty-state">Messages and protocol events will appear here.</div>
      <form id="messageForm" class="composer">
        <textarea id="messageInput" rows="3" placeholder="Message active group..."></textarea>
        <button id="sendButton" type="submit">Send</button>
      </form>
      <form id="addMemberForm" class="members-invite-form hidden">
        <input id="memberRidInput" type="text" placeholder="Token" autocomplete="off" />
        <button id="addMemberButton" type="submit">Send</button>
      </form>
    </div>
    <div class="chat-members">
      <div class="list-header">
        <div class="list-title">Members</div>
      </div>
      <div id="membersList" class="members-list empty-state">No members</div>
    </div>
  </div>

  <div id="toast" class="toast" hidden></div>
</body>

</html>
