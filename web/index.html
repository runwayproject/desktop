<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Asphalt</title>
  <script type="module" src="./main.js"></script>
</head>

<body>
  <nav class="menubar">
    <span class="brand">Asphalt</span>
    <button class="nav-btn active" data-view="chat">Chat</button>
    <button class="nav-btn" data-view="identity">Identity</button>
    <div class="menubar-spacer"></div>
    <span id="connectionSummary" class="menubar-status">Connecting...</span>
    <button id="refreshButton" class="nav-action">Refresh</button>
  </nav>

  <div class="invite-bar" id="inviteBar" hidden>
    <span>Pending invite from <strong id="inviteRid">Unknown</strong></span>
    <div class="invite-actions">
      <button id="acceptInviteButton">Accept</button>
      <button id="rejectInviteButton">Reject</button>
    </div>
  </div>

  <div class="views">
    <div class="view" id="view-chat">
      <div class="chat-peers">
        <div class="list-header">
          <div class="chat-peers-header">Groups</div>
          <button id="createGroupButton" class="panel-action" type="button">Create</button>
        </div>
        <div id="peerList" class="peer-list"></div>
      </div>
      <div class="chat-main">
        <div class="chat-header">
          <span id="activeGroupTitle">No group selected</span>
          <button id="clearActivityButton" class="action-link">Clear</button>
        </div>
        <div id="activityList" class="activity-list empty-state">Messages and protocol events will appear here.</div>
        <form id="messageForm" class="composer">
          <textarea id="messageInput" rows="3" placeholder="Message active group..."></textarea>
          <button id="sendButton" type="submit">Send</button>
        </form>
      </div>
      <div class="chat-members">
        <div class="list-header">
          <div class="chat-members-header">Members</div>
          <button id="toggleInviteButton" class="panel-action" type="button">Invite</button>
        </div>
        <form id="addMemberForm" class="members-invite-form hidden">
          <input id="memberRidInput" type="text" placeholder="Member RID" autocomplete="off" />
          <button id="addMemberButton" type="submit">Send</button>
        </form>
        <div id="membersList" class="members-list empty-state">No members</div>
      </div>
    </div>

    <div class="view hidden" id="view-identity">
      <div class="page-body">
        <h2>Your Identity</h2>
        <p class="fact-label">Relay ID</p>
        <p id="ridValue" class="mono">Loading...</p>
        <div class="identity-actions">
          <button id="rotateRidButton" type="button">Rotate RID</button>
        </div>
        <hr />
        <h2>Session Status</h2>
        <div id="statusFacts" class="facts"></div>
      </div>
    </div>
  </div>

  <div id="toast" class="toast" hidden></div>
</body>

</html>
